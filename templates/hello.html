{% extends "index.html" %} {% block title %}Inicio - Consulta de Materiales{%
  endblock %} {% block content %}
  <div class="px-4 py-3 my-2 text-center">
    <h1 class="display-6 fw-bold text-primary">Restaurant QA</h1>
  </div>
  
  <form method="post" action="{{url_for('pdf')}}">
    <div class="col-md-10 col-10 mx-auto text-center">
        <img src="{{ url_for('static', filename='images/retaurante.jpg') }}" alt="copa_america_2024" class="custom-image">
      <div
        class="d-grid d-sm-flex justify-content-sm-center align-items-center my-1"
      >
        <input
          type="text"
          class="form-control"
          id="name"
          name="name"
          placeholder="Inserte su pregunta aquí"
          style="width: 90%"
        />
        <button type="submit" class="btn btn-primary btn-lg px-4 py-1">
          consultar
        </button>
      </div>
    </div>
  </form>
  
  {% if answer %}
  <div class="container mt-4">
    <div class="row">
      <div class="col-xl-12">
        <div class="message-container">
          <div class="message user-message">
            <p>{{ name }}</p>
            <img src="{{ url_for('static', filename='images/github_logo.png') }}" alt="Usuario" class="logo">
          </div>
          <div class="message bot-message">
            <img src="{{ url_for('static', filename='images/robo_to-512.png') }}" alt="Bot" class="logo">
            <p>{{ answer }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  {% endif %} {% endblock %}
