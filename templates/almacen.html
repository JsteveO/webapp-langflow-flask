<!-- consulta.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIA - Suministros</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='fav.ico') }}">
    
    <style>
        body {
                font-family: Arial, sans-serif;
            }

            .styled-table-container {
                width: 80%; /* Ajusta el ancho del contenedor de la tabla */
                margin: 25px auto; /* Centra el contenedor horizontalmente y aplica margen arriba y abajo */
            }

            .styled-table {
                width: 100%; /* Ajusta el ancho de la tabla según tus necesidades */
                border-collapse: collapse;
                margin: 25px auto; /* Centra la tabla dentro de su contenedor */
                font-size: 16px;
                text-align: center;
            }

            .styled-table th, .styled-table td {
                padding: 12px 15px;
                border-bottom: 1px solid #ddd;
            }

            .styled-table th {
                background-color: #f2f2f2;
                color: #333;
                text-align: center; /* Centra el texto dentro de las celdas th */
            }

            .styled-table tbody tr:nth-of-type(even) {
                background-color: #f9f9f9;
            }

            .styled-table tbody tr:hover {
                background-color: #ececec;
            }

            .download-container {
                display: flex;
                align-items: center;
                justify-content: space-between;
                background-color: #3498db;
                color: white;
                padding: 15px;
                border-radius: 5px;
                margin-top: 15px;
            }

        
    </style>
</head>
<body>
    <div class="download-container">
        <h1 style="background-color: #3498db; color: white; padding: 15px; border-radius: 5px;">
            <strong>STOCK - EIA TIGO MEDELLIN MASIVOS</strong>                
        </h1>
        <img class="logo-img" src="{{ url_for('static', filename='images/logo-eiasa-new.png') }}" alt="EIA Logo" width="179" height="71">
    </div>
    <div class="container mt-4">
        <div class="styled-table">
            {{ df_html | safe }}  <!-- Renderiza el HTML del DataFrame -->
        </div>
    </div>
</body>
</html>
