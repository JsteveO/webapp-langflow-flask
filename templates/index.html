<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta EIA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        min-height: 100vh;
      }
      .sidebar {
        width: 200px;
        background-color: #3498db;
        color: white;
        padding: 20px 0;
        display: flex;
        flex-direction: column;
      }
      .sidebar .navbar-brand {
        text-align: center;
        margin-bottom: 20px;
      }
      .sidebar .navbar-brand img {
        height: 60px;
      }
      .sidebar .nav-link {
        color: white !important;
        padding: 10px 20px;
      }
      .sidebar .nav-link:hover {
        background-color: rgba(255,255,255,0.1);
      }
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      main {
        flex: 1;
        padding: 20px;
      }
      .copyright {
        background-color: #ffffff;
        text-align: center;
        padding: 10px;
      }
      .message-container {
        max-width: 800px;
        margin: 20px auto;
      }
      .message {
        display: flex;
        align-items: flex-start;
        margin-bottom: 15px;
        padding: 10px;
        border-radius: 10px;
      }
      .user-message {
        background-color: #f0f0f0;
        justify-content: flex-end;
      }
      .bot-message {
        background-color: #e6f3ff;
        justify-content: flex-start;
      }
      .message img {
        width: 40px;
        height: 40px;
        margin-right: 10px;
      }
      .message p {
        margin: 0;
        padding: 5px 10px;
        border-radius: 10px;
        max-width: 70%;
        word-wrap: break-word;
        background-color: #e6f3ff;
      }
      .custom-image {
        width: 200px;  /* Ajusta el tamaño según sea necesario */
        height: auto;
        filter: blur(2px);  /* Ajusta el valor del desenfoque según sea necesario */
      }

    </style>
  </head>
  <body>
    <nav class="sidebar">
      <a class="navbar-brand" href="#">
        <img src="{{ url_for('static', filename='images/azure-icon.svg') }}" alt="Azure Logo">
      </a>
      <ul class="nav flex-column">
        <li class="nav-item">
          <a class="nav-link form-label fw-bold fs-5" href="/">Web</a>
        </li>
        <li class="nav-item">
          <a class="nav-link form-label fw-bold fs-5" href="/op">PDF</a>
        </li>
      </ul>
    </nav>

    <div class="main-content">
      <main>
        {% block content %}{% endblock %}
      </main>

      <footer class="copyright">
        <p>© 2024 St. Todos los derechos reservados.</p>
      </footer>
    </div>

    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
  </body>
</html>
